[toolchain]
# Tracks the rust-toolchain.toml at the head of Rust-GPU/rust-gpu main.
# Bump when bumping the spirv-* crate pins; mismatches between this
# nightly and the codegen backend version produce cryptic rustc
# panics deep in the SPIR-V backend.
channel = "nightly-2026-04-11"
components = ["rust-src", "rustc-dev", "llvm-tools"]
